version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-traduser}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-tradaccount}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traduser} -d ${POSTGRES_DB:-tradaccount}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8004}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8004}:8000"
    environment:
      # DATABASE_URL must be supplied via .env. The default value below is an
      # intentionally invalid placeholder so a misconfigured deployment fails
      # loudly at startup instead of silently creating an empty database with
      # a mismatched password. The db service reads its password from the
      # postgres_password secret; this URL must use the SAME password.
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env and match the postgres_password secret}
      ENVIRONMENT: production
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-placeholder}
      REDIS_URL: redis://redis:6379/0
      # Default passwords are intentionally invalid placeholders so the
      # deployment refuses to start until strong passwords are configured
      # in .env. The previous defaults (admin123, accountant1, auditor123)
      # were weak and present in version control — a security risk.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      ACCOUNTANT_PASSWORD: ${ACCOUNTANT_PASSWORD:?ACCOUNTANT_PASSWORD must be set in .env}
      AUDITOR_PASSWORD: ${AUDITOR_PASSWORD:?AUDITOR_PASSWORD must be set in .env}
    secrets:
      - postgres_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  pgdata:
  redisdata:
  uploads:
